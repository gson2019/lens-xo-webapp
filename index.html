<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="Car Hunter is a photo-capture game for Meta Ray-Ban Display: aim at a car, capture, and on-device object detection scores the catch.">
  <meta name="mrbd-web-app-capable" content="yes">
  <title>Car Hunter</title>
  <link rel="icon" type="image/png" sizes="128x128" href="lens-xo-launcher-128.png">
  <link rel="apple-touch-icon" sizes="192x192" href="lens-xo-launcher-192.png">
  <link rel="manifest" href="lens-xo.webmanifest?v=carhunter1">
  <link rel="preload" href="lens-xo-launcher-192.png" as="image">
  <style>
    html, body { width: 600px; height: 600px; margin: 0; overflow: hidden; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .loading-screen { position: fixed; inset: 0; z-index: 100; width: 600px; height: 600px; padding: 8px; background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; opacity: 1; transition: opacity 180ms ease; box-sizing: border-box; }
    .loading-screen.hidden { opacity: 0; pointer-events: none; }
    .loading-screen h1 { margin: 0; font-size: 34px; line-height: 1.05; font-weight: 800; }
    .loading-screen p { margin: 0; color: #b0b3b8; font-size: 16px; font-weight: 750; }
    .loading-logo { width: 220px; height: 112px; border-radius: 8px; background: #101218; display: flex; align-items: center; justify-content: center; font-size: 64px; }
  </style>
  <link rel="preload" href="styles.css?v=carhunter1" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="styles.css?v=carhunter1"></noscript>
</head>
<body>
  <div id="loading-screen" class="loading-screen" role="status" aria-label="Loading Car Hunter">
    <div class="loading-logo" aria-hidden="true">🚗</div>
    <h1>Car Hunter</h1>
    <p>Loading</p>
  </div>

  <div id="app" aria-live="polite">
    <section id="game" class="screen" aria-label="Car Hunter game">
      <header class="header">
        <div>
          <p class="eyebrow">Meta Ray-Ban Display</p>
          <h1>Car Hunter</h1>
        </div>
        <div class="score-panel" aria-label="Score">
          <span>🚗 <strong id="caught-score">0</strong></span>
          <span>Shots <strong id="shots-score">0</strong></span>
        </div>
      </header>

      <main class="game-content">
        <div class="viewfinder">
          <video id="viewfinder" playsinline muted autoplay></video>
          <div class="reticle" aria-hidden="true"></div>
          <div id="detector-pill" class="detector-pill">Detector: loading…</div>
          <div id="vf-status" class="vf-status">Starting camera…</div>
        </div>
      </main>

      <nav class="nav-bar" aria-label="Game actions">
        <button id="capture-btn" class="nav-item nav-primary focusable" data-action="capture">📸 Capture</button>
        <button id="reset-btn" class="nav-item focusable" data-action="reset">Reset</button>
      </nav>
    </section>

    <div id="result-overlay" class="result-overlay" role="status" aria-live="assertive">
      <div class="result-emoji" id="result-emoji">🚗</div>
      <div class="result-title" id="result-title">Captured!</div>
      <div class="result-sub" id="result-sub"></div>
      <div class="result-hint">Press Enter to continue</div>
    </div>
  </div>

  <div id="toast" class="toast" role="status"></div>
  <script src="app.js?v=carhunter1"></script>
</body>
</html>
